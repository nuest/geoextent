name: AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build AppImage
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for setuptools-scm

      - name: Set up Python (for version detection)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine version
        id: version
        run: |
          pip install setuptools-scm
          VERSION=$(python -c 'from setuptools_scm import get_version; print(get_version())')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Build AppImage
        env:
          GEOEXTENT_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/build-appimage.sh

      - name: Smoke test — version
        run: |
          chmod +x geoextent-*-x86_64.AppImage
          ./geoextent-*-x86_64.AppImage --version

      - name: Smoke test — help
        run: ./geoextent-*-x86_64.AppImage --help

      - name: Smoke test — formats
        run: ./geoextent-*-x86_64.AppImage --formats

      - name: Smoke test — GeoTIFF bounding box (GDAL raster)
        run: |
          OUTPUT=$(./geoextent-*-x86_64.AppImage -b tests/testdata/tif/wf_100m_klas.tif)
          echo "${OUTPUT}"
          echo "${OUTPUT}" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['type'] == 'FeatureCollection', 'Not a FeatureCollection'
          assert len(d['features']) > 0, 'No features'
          assert d['features'][0]['geometry'] is not None, 'No geometry'
          "

      - name: Smoke test — GeoJSON bbox + temporal (OGR vector)
        run: |
          OUTPUT=$(./geoextent-*-x86_64.AppImage -b -t tests/testdata/geojson/muenster_ring_zeit.geojson)
          echo "${OUTPUT}"
          echo "${OUTPUT}" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['type'] == 'FeatureCollection', 'Not a FeatureCollection'
          assert len(d['features']) > 0, 'No features'
          assert d['features'][0]['geometry'] is not None, 'No geometry'
          assert 'tbox' in d['features'][0]['properties'], 'No tbox in properties'
          "

      - name: Smoke test — CSV bounding box (pandas)
        run: |
          OUTPUT=$(./geoextent-*-x86_64.AppImage -b tests/testdata/csv/cities_NL.csv)
          echo "${OUTPUT}"
          echo "${OUTPUT}" | python -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['type'] == 'FeatureCollection', 'Not a FeatureCollection'
          assert len(d['features']) > 0, 'No features'
          assert d['features'][0]['geometry'] is not None, 'No geometry'
          "

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: geoextent-appimage
          path: geoextent-*-x86_64.AppImage
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: geoextent-*-x86_64.AppImage
